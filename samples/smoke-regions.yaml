# smoke-regions.yaml — Phase 8 hermetic smoke fixture for REGION-01/02/03.
#
# Demonstrates the three region requirements end-to-end:
#   - REGION-01: selector region capture ('hero' targets [data-test="region-hero"])
#   - REGION-02: anchor region capture ('cards' spans from→to across the 400px gradient spacer)
#   - REGION-03: --only=<name> isolation (separate invocation per the run instructions below)
#
# Reuses samples/serve-smoke.js (extended in Phase 8 with new data-test sections —
# [data-test="region-hero"], [data-test="region-from"], [data-test="region-to"]).
# The 2000px PREP-04 spacer in serve-smoke.js positions the region sections below the
# fold so scrollIntoViewIfNeeded actually has to scroll to reveal them — exercising
# Wave 2's scroll-then-measure flow against a real DOM.
#
# Output template uses {region} so per-region paths are distinct. The schema's root
# .superRefine enforces this: omitting {region} when regions: is declared produces
# a ConfigError at validation time (no silent overwrites).
#
# Singular `viewport:` form is intentional — exercises Phase 7 D-01 back-compat
# alias on the same run that exercises Phase 8 region capture (verifies the
# Phase 7 ↔ Phase 8 boundary stays clean).
#
# To run this smoke locally:
#   node samples/serve-smoke.js &
#   node index.js capture samples/smoke-regions.yaml                # captures hero + cards + full-page (Open Q#1 lock A: capture everything declared)
#   node index.js capture samples/smoke-regions.yaml --only=hero    # captures hero ONLY (skips full-page and cards)
#   kill %1
#
name: phase-08-smoke-regions
baseUrl: http://127.0.0.1:7357
output: /tmp/framershot-smoke-regions/{region}-{page}.png
deviceScaleFactor: 2
viewport:
  width: 800
  height: 600
  name: smoke
page:
  path: "/"
  name: home
prepare:
  animations: true
  scrollPrime: true
  extraDelay: 500
regions:
  - name: hero                  # REGION-01: selector mode
    selector: '[data-test="region-hero"]'
    padding: 20
  - name: cards                 # REGION-02: anchor mode (from→to union)
    from: '[data-test="region-from"]'
    to: '[data-test="region-to"]'
    padding: 10
